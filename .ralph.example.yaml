# Ralph Configuration Example
# Copy this to .ralph.yaml or .ralph.local.yaml to customize

# Agent configuration
agent:
  # Agent provider: "claude" (default) or "codex"
  # - claude: Uses Claude CLI for agent execution
  # - codex: Uses Codex CLI for agent execution
  provider: claude

  # Co-author for git commits
  coAuthor: "Claude Opus 4.6 <noreply@anthropic.com>"

  # Optional: Path to context file to inject into agent prompt
  # contextInjectionPath: "CLAUDE.md"

  # Codex-specific settings (only used when provider: codex)
  codex:
    # Path to Codex CLI executable (default: "codex")
    # codexPath: "codex"

    # Approval policy for command execution
    # Options: never, on-request, on-failure, untrusted
    approvalPolicy: on-request

    # Sandbox mode for filesystem access
    # Options: read-only, workspace-write, danger-full-access
    sandboxMode: workspace-write

    # Execution level (L1=Executor, L2=Builder, L3=Autonomous, L4=Specialist)
    level: L2

    # Max auto-recovery attempts when stalled
    maxRecoveryAttempts: 2

    # Minutes of inactivity before detecting stall
    stallTimeoutMinutes: 5

  # Stagnation detection
  stagnation:
    noProgressThreshold: 3      # Loops with no file changes before stagnation
    sameErrorThreshold: 5       # Repeated errors before stagnation
    maxLoopsPerStory: 10        # Maximum loops per story

  # Stale detection (multi-signal activity monitoring)
  staleDetection:
    enabled: true
    timeoutsMs:
      implementing: 1800000     # 30 minutes for implementation work
      building: 3600000         # 60 minutes for builds
      testing: 5400000          # 90 minutes for tests
      verifying: 5400000        # 90 minutes for verification
      unknown: 1800000          # 30 minutes fallback
    signals:
      gitCommits: true          # Use git commit timestamps
      fileChanges: true         # Use changed file mtimes
      logMtime: true            # Use log file mtime
      stateUpdatedAt: true      # Use state updatedAt field

# Merge configuration
merge:
  # Git remote to fetch/push (set to null for local-only repos)
  remote: origin

  # Main branch name
  mainBranch: main

  # Auto-merge strategy
  autoMerge: true

  # Conflict resolution strategy
  onConflict: agent  # Options: auto_theirs, auto_ours, notify, agent

# Worktree configuration
worktree:
  enabled: true
  baseDir: ".tmp/worktrees"
  prefix: "ralph-"

# Package manager
packageManager:
  type: auto  # Options: pnpm, npm, yarn, bun, cargo, go, pip, auto

# Runner configuration
runner:
  maxConcurrency: 3             # Maximum concurrent PRD executions
  autoRecovery: true            # Auto-retry interrupted executions
  pollIntervalMs: 5000          # How often to check for new work

# Storage configuration
storage:
  dataDir: "~/.ralph"
  maxArchivedExecutions: 50

# Quality gates (commands that must pass before merge)
gates:
  - id: type-check
    name: Type Check
    command: pnpm check-types
    timeoutMs: 120000
    required: true
    when: pre-merge

  - id: build
    name: Build
    command: pnpm build
    timeoutMs: 180000
    required: true
    when: pre-merge
